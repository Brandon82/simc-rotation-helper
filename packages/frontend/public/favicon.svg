<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="#1a0a2e"/>
  <!-- Sword blade -->
  <line x1="24" y1="6" x2="24" y2="36" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
  <!-- Sword tip -->
  <polygon points="24,4 21,12 27,12" fill="#a855f7"/>
  <!-- Crossguard -->
  <line x1="14" y1="28" x2="34" y2="28" stroke="#c084fc" stroke-width="3" stroke-linecap="round"/>
  <!-- Grip -->
  <line x1="24" y1="28" x2="24" y2="38" stroke="#7e22ce" stroke-width="4" stroke-linecap="round"/>
  <!-- Pommel -->
  <circle cx="24" cy="40" r="3.5" fill="#9333ea" stroke="#c084fc" stroke-width="1.5"/>
  <!-- Blade shine -->
  <line x1="22" y1="10" x2="22" y2="26" stroke="#e9d5ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
</svg>
