<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 490" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="490" fill="#0f172a" rx="12"/>

  <!-- FRONTEND -->
  <rect x="180" y="20" width="400" height="64" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="380" y="47" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="600">Frontend</text>
  <text x="380" y="67" text-anchor="middle" fill="#94a3b8" font-size="12">React · Vite · TanStack Query</text>

  <!-- Frontend → Backend -->
  <line x1="380" y1="84" x2="380" y2="116" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="394" y="104" fill="#64748b" font-size="11">REST / JSON</text>

  <!-- BACKEND -->
  <rect x="16" y="120" width="728" height="218" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="36" y="141" fill="#475569" font-size="11">Backend  (Express · better-sqlite3 · node-cron)</text>

  <!-- API Routes -->
  <rect x="36" y="152" width="152" height="52" rx="6" fill="#0f172a" stroke="#334155"/>
  <text x="112" y="176" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500">API Routes</text>
  <text x="112" y="195" text-anchor="middle" fill="#94a3b8" font-size="11">GET /api/*</text>

  <!-- API → SQLite -->
  <line x1="188" y1="178" x2="264" y2="178" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="226" y="171" text-anchor="middle" fill="#64748b" font-size="10">read</text>

  <!-- SQLite DB -->
  <rect x="264" y="152" width="152" height="52" rx="6" fill="#0f172a" stroke="#334155"/>
  <text x="340" y="176" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500">SQLite DB</text>
  <text x="340" y="195" text-anchor="middle" fill="#94a3b8" font-size="11">guides · history</text>

  <!-- Guide Service → SQLite (store) -->
  <line x1="354" y1="256" x2="354" y2="204" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="368" y="234" fill="#64748b" font-size="10">store</text>

  <!-- POST /admin/refresh (dashed) -->
  <rect x="36" y="260" width="152" height="52" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="112" y="282" text-anchor="middle" fill="#64748b" font-size="11">POST</text>
  <text x="112" y="300" text-anchor="middle" fill="#64748b" font-size="11">/admin/refresh</text>

  <!-- admin → Guide Service -->
  <line x1="188" y1="286" x2="264" y2="286" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>

  <!-- Guide Service -->
  <rect x="264" y="260" width="152" height="52" rx="6" fill="#0f172a" stroke="#334155"/>
  <text x="340" y="284" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500">Guide Service</text>
  <text x="340" y="303" text-anchor="middle" fill="#94a3b8" font-size="11">orchestration</text>

  <!-- node-cron -->
  <rect x="556" y="260" width="172" height="52" rx="6" fill="#0f172a" stroke="#334155"/>
  <text x="642" y="284" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500">node-cron</text>
  <text x="642" y="303" text-anchor="middle" fill="#94a3b8" font-size="11">3 AM UTC daily</text>

  <!-- cron → Guide Service -->
  <line x1="556" y1="286" x2="416" y2="286" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Guide Service → External -->
  <line x1="340" y1="312" x2="340" y2="358" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- EXTERNAL SERVICES -->
  <rect x="16" y="362" width="728" height="112" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="36" y="382" fill="#475569" font-size="11">External Services</text>

  <!-- GitHub -->
  <rect x="36" y="390" width="310" height="70" rx="6" fill="#0f172a" stroke="#334155"/>
  <text x="191" y="415" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500">GitHub</text>
  <text x="191" y="434" text-anchor="middle" fill="#94a3b8" font-size="11">simulationcraft/simc · branch: midnight</text>
  <text x="191" y="451" text-anchor="middle" fill="#475569" font-size="10">fetch .simc APL</text>

  <!-- GitHub → Anthropic -->
  <line x1="346" y1="423" x2="414" y2="423" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="380" y="415" text-anchor="middle" fill="#64748b" font-size="10">raw APL</text>

  <!-- Anthropic -->
  <rect x="414" y="390" width="314" height="70" rx="6" fill="#0f172a" stroke="#334155"/>
  <text x="571" y="415" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="500">Anthropic Claude API</text>
  <text x="571" y="434" text-anchor="middle" fill="#94a3b8" font-size="11">claude-sonnet-4-6</text>
  <text x="571" y="451" text-anchor="middle" fill="#475569" font-size="10">generate guide JSON</text>
</svg>
